name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: remoteclaw-linux-amd64
          - goos: darwin
            goarch: arm64
            artifact: remoteclaw-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: remoteclaw-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MODULE="github.com/3rg0n/remoteclaw"
          go build -ldflags "-s -w \
            -X ${MODULE}/internal/config.Version=${VERSION} \
            -X ${MODULE}/internal/config.Commit=${COMMIT} \
            -X ${MODULE}/internal/config.Date=${DATE}" \
            -o ${{ matrix.artifact }} ./cmd/remoteclaw

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > CHECKSUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
