name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 ./...

  build:
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: remoteclaw-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: remoteclaw-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: remoteclaw-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: remoteclaw-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: remoteclaw-windows-amd64.exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MODULE="github.com/3rg0n/remoteclaw"
          go build -ldflags "-s -w \
            -X ${MODULE}/internal/config.Version=${VERSION} \
            -X ${MODULE}/internal/config.Commit=${COMMIT} \
            -X ${MODULE}/internal/config.Date=${DATE}" \
            -o ${{ matrix.artifact }} ./cmd/remoteclaw

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > CHECKSUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
          files: artifacts/*
