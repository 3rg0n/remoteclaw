# WCC Configuration
# Copy to config.yaml and fill in your values.
# Environment variables referenced with ${VAR} are expanded at load time.
# If a .env file exists in the working directory, it is loaded first (overrides system env vars).

# Connection mode: "native" or "wmcp"
mode: native

# Native Webex mode settings
webex:
  bot_token: "${WEBEX_BOT_TOKEN}"
  allowed_emails:
    - "admin@company.com"
    - "ops-team@company.com"

# WMCP mode settings (when mode: wmcp)
wmcp:
  endpoint: "https://wmcp.example.com"
  token: "${WMCP_TOKEN}"

# AWS Bedrock (only required when provider is "bedrock")
aws:
  region: "us-west-2"
  # credentials via default provider chain (env, IAM role, ~/.aws/credentials)

# AI
ai:
  # Provider: "auto" (default), "local" (Ollama), or "bedrock" (AWS)
  # "auto" uses Bedrock if AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY are set, otherwise local
  provider: "auto"
  # Model name — for local: "phi4-mini" (default, 3.8B) or "phi4" (14B)
  #             for bedrock: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  model: "phi4-mini"
  temperature: 0.2
  max_tokens: 4096
  max_iterations: 10
  # Ollama host (default: http://localhost:11434)
  # ollama_host: "http://localhost:11434"

# Security
security:
  dangerous_commands: true           # Block dangerous commands (rm -rf /, etc.)
  audit_log: ""                      # Audit log file path (empty = disabled)
  rate_limit_per_min: 10             # Max requests per minute per space (0 = disabled)
  challenge: "${CHALLENGE}"          # Challenge string for destructive command confirmation (empty = disabled)
                                     # When set, dangerous commands prompt the user to reply with this string to confirm

# Execution
execution:
  default_timeout: "30s"
  max_timeout: "5m"
  shell: ""  # auto-detect: sh on Linux/macOS, powershell on Windows

# Logging
logging:
  level: "info"
  format: "json"
  file: ""  # empty = stdout only

# Health check
health:
  enabled: true
  addr: "127.0.0.1:9090"
